<div class="radio-wrapper">
  <input id="example-29-1" type="radio" name="radio-examples" />
  <label for="example-29-1" data-amount="$50k-$100k"></label>
  <input id="example-29-2" type="radio" name="radio-examples" />
  <label for="example-29-2" data-amount="$100k+"></label>
  <div class="amount-pos"></div>
</div>

<style>
  .radio-wrapper {
    display: flex;
    flex-direction: row;
    align-content: stretch;
    position: relative;
    width: 100%;
    height: 50px;
    --number-of-options: 2;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    margin-bottom: 1.2em;
  }
  .radio-wrapper::before {
    content: " ";
    position: absolute;
    height: 2px;
    width: 100%;
    width: calc(100% * (calc(var(--number-of-options) - 1) / var(--number-of-options)));
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #000;
  }
  .radio-wrapper input,
  .radio-wrapper label {
    box-sizing: border-box;
    flex: 1;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    cursor: pointer;
  }
  .radio-wrapper label {
    display: inline-block;
    position: relative;
    width: 20%;
    height: 100%;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }
  .radio-wrapper label::before {
    content: attr(data-amount);
    position: absolute;
    left: 50%;
    padding-top: 10px;
    transform: translate(-50%, 45px);
    font-size: 14px;
    letter-spacing: 0.4px;
    font-weight: 400;
    white-space: nowrap;
    opacity: 0.85;
    transition: all 0.15s ease-in-out;
  }
  .radio-wrapper label::after {
    content: " ";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    border: 2px solid #000;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    z-index: 1;
    cursor: pointer;
    transition: all 0.15s ease-in-out;
  }
  .radio-wrapper label:hover::after {
    transform: translate(-50%, -50%) scale(1.25);
  }
  .radio-wrapper input {
    display: none;
  }
  .radio-wrapper input:checked + label::before {
    font-weight: 800;
    opacity: 1;
  }
  .radio-wrapper input:checked + label::after {
    border-width: 4px;
    transform: translate(-50%, -50%) scale(0.75);
  }
  .radio-wrapper input:checked ~ .amount-pos {
    opacity: 1;
  }
  .radio-wrapper input:checked:nth-child(1) ~ .amount-pos {
    left: 25%;
  }
  .radio-wrapper input:checked:nth-child(3) ~ .amount-pos {
    left: 75%;
  }
  .radio-wrapper .amount-pos {
    display: block;
    position: absolute;
    top: 50%;
    width: 12px;
    height: 12px;
    background: #000;
    border-radius: 50%;
    transition: all 0.15s ease-in-out;
    transform: translate(-50%, -50%);
    border: 2px solid #fff;
    opacity: 0;
    z-index: 2;
    left: 25%;
    pointer-events: none;
  }
  .radio-wrapper input + label::before {
    transform: translate(-50%, 45px) scale(0.9);
    transition: all 0.15s linear;
  }
  .radio-wrapper input:checked + label::before {
    transform: translate(-50%, 45px) scale(1.1);
    transition: all 0.15s linear;
  }
</style>
