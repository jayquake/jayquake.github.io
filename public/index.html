<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="description" content="RAIDEN — AccessFlow engine rules library, test runner, and QA workspace" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RAIDEN — Engine Rules Library" />
    <meta property="og:description" content="MGS2 carbon HUD for accessibility engine rule testing and validation" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RAIDEN — Engine Rules Library" />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preload" href="%PUBLIC_URL%/data.json" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="%PUBLIC_URL%/engine-rules.json" as="fetch" crossorigin="anonymous" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>RAIDEN — Engine Rules</title>
    <script>
      // SPA redirect handler: restores the real URL from the ?p= query param
      // set by 404.html before React Router mounts.
      (function () {
        var r = new URLSearchParams(window.location.search).get("p");
        if (r) window.history.replaceState(null, "", "/" + r);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <script>
      (function () {
        function loadAccessFlowScripts() {
          var flow = document.createElement("script");
          flow.src = "https://acsbapp.com/app-flow.js";
          flow.async = true;
          (document.head || document.body).appendChild(flow);

          var app = document.createElement("script");
          app.src = "https://acsbapp.com/apps/app/dist/js/app.js";
          app.async = true;
          app.onload = function () {
            if (window.acsbJS) window.acsbJS.init();
          };
          (document.head || document.body).appendChild(app);
        }
        if ("requestIdleCallback" in window) {
          requestIdleCallback(loadAccessFlowScripts, { timeout: 4000 });
        } else {
          window.addEventListener("load", loadAccessFlowScripts);
        }
      })();
    </script>
  </body>
</html>
