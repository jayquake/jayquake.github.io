name: SDK E2E Dispatch

on:
  workflow_dispatch:
    inputs:
      sdk_fixture_url:
        description: Hosted HTML fixture URL for SDK audit smoke
        required: false
        default: 'https://jayquake.github.io/sdk-audit-template.html'
        type: string

concurrency:
  group: sdk-e2e-dispatch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sdk-smoke:
    name: SDK audit smoke (dispatch)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          GCP_SDK_NPM_REGISTRY_URL: us-east1-npm.pkg.dev/accessflow-rm5h5j8lmu/stag-accessflow-npm
          ACCESSFLOW_NPM_REGISTRY_TOKEN: ${{ secrets.ACCESSFLOW_NPM_REGISTRY_TOKEN }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Ensure AccessFlow API key is set
        run: |
          if [ -z "$AF_NODE_PACKAGE_KEY" ]; then
            echo "::error::Add AF_NODE_PACKAGE_KEY to GitHub Secrets."
            exit 1
          fi
          echo "AccessFlow API key is set."
        env:
          AF_NODE_PACKAGE_KEY: ${{ secrets.AF_NODE_PACKAGE_KEY }}

      - name: Run SDK audit smoke
        run: cd sdk/tests/playwright/node && npx playwright test tests/sdk-audit-smoke.spec.js
        env:
          CI: true
          AF_NODE_PACKAGE_KEY: ${{ secrets.AF_NODE_PACKAGE_KEY }}
          SDK_FIXTURE_URL: ${{ inputs.sdk_fixture_url }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-e2e-dispatch-report
          path: sdk/tests/playwright/node/playwright-report/
          retention-days: 14
