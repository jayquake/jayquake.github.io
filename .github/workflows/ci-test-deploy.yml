name: CI, Test & Deploy

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # Required for pushing to gh-pages branch
  pages: write
  id-token: write

jobs:
  # =====================================================================
  # JS Lane — Playwright + AccessFlow Node SDK
  # =====================================================================
  test-js:
    name: JS Lane — Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          CI: true

      - name: Ensure AccessFlow API key is set (Playwright)
        run: |
          if [ -z "$AF_NODE_PACKAGE_KEY" ] && [ -z "$ACCESSFLOW_SDK_API_KEY" ]; then
            echo "::error::Add AF_NODE_PACKAGE_KEY or ACCESSFLOW_SDK_API_KEY to this repo's GitHub Secrets."
            exit 1
          fi
          echo "AccessFlow API key is set."
        env:
          AF_NODE_PACKAGE_KEY: ${{ secrets.AF_NODE_PACKAGE_KEY }}
          ACCESSFLOW_SDK_API_KEY: ${{ secrets.ACCESSFLOW_SDK_API_KEY }}

      - name: Run JS Playwright Tests
        run: cd test-suite && npx playwright test
        env:
          CI: true
          AF_NODE_PACKAGE_KEY: ${{ secrets.AF_NODE_PACKAGE_KEY }}
          ACCESSFLOW_SDK_API_KEY: ${{ secrets.ACCESSFLOW_SDK_API_KEY }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-playwright-report
          path: test-suite/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-test-results
          path: test-suite/test-results/
          retention-days: 30

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-playwright
          path: build/
          retention-days: 7

