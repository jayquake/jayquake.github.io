  # =====================================================================
  # Python Lane — pytest-playwright + AccessFlow Python SDK
  # =====================================================================
  test-python:
    name: Python Lane — Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Node dependencies & build app
        run: |
          npm ci --legacy-peer-deps
          npm run build
        env:
          CI: true

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        working-directory: python-tests
        run: |
          pip install -r requirements.txt
          pip install --force-reinstall --no-deps ../pythonSdk/accessflow_sdk-1.1.0-py3-none-any.whl

      - name: Verify Python SDK version
        working-directory: python-tests
        run: python -c "import importlib.metadata as m; print('accessflow-sdk:', m.version('accessflow-sdk'))"

      - name: Install Playwright Browsers (Python)
        run: python -m playwright install --with-deps chromium

      - name: Start application server
        run: npx serve -s build -l 3000 &
        env:
          CI: true

      - name: Wait for application
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "App ready!" && exit 0
            sleep 1
          done
          echo "App did not start within 60 s" && exit 1

      - name: Run Python Playwright Tests
        working-directory: python-tests
        run: pytest --junitxml=test-results/results.xml -v
        env:
          CI: true
          PYTHON_ACCESSFLOW_SDK_TOKEN: ${{ secrets.PYTHON_ACCESSFLOW_SDK_TOKEN }}

      - name: Upload Python Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: python-tests/test-results/
          retention-days: 30

