<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages
      // Preserves the path and query string by encoding them into a query parameter
      // and redirecting to the root index.html, which restores the URL via history API.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        encodeURIComponent(
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
          l.search + l.hash
        )
      );
    </script>
  </head>
  <body></body>
</html>
